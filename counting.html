<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a855f7">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🔢 Count With Me — Vaanya's Playground</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Comic Sans MS','Chalkboard SE',cursive,sans-serif;user-select:none}
body{min-height:100vh;background:linear-gradient(135deg,#bbf7d0,#fef9c3);display:flex;flex-direction:column;align-items:center;padding:16px}
.home{position:fixed;top:12px;left:12px;font-size:1.6rem;text-decoration:none;background:#fff;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(0,0,0,.15);z-index:10}
h1{color:#15803d;margin:10px 0;font-size:1.6rem}
#score{color:#166534;font-size:1.1rem;margin-bottom:8px}
#items{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:center;min-height:180px;max-width:600px;background:rgba(255,255,255,.6);border-radius:24px;padding:24px;margin-bottom:20px}
#items span{font-size:3.4rem;animation:bounce 1.5s infinite alternate;cursor:pointer}
#items span.counted{transform:scale(1.25);filter:drop-shadow(0 0 6px gold)}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.opts{display:flex;gap:20px}
.opts button{font-size:2.4rem;font-weight:bold;width:90px;height:90px;border:none;border-radius:24px;background:#fff;color:#15803d;box-shadow:0 6px 0 rgba(0,0,0,.15);cursor:pointer}
.opts button:active{transform:translateY(3px)}
.opts button.right{background:#22c55e;color:#fff;animation:party .5s}
.opts button.wrong{background:#fca5a5;animation:shake .4s}
@keyframes party{50%{transform:scale(1.3) rotate(8deg)}}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
#msg{margin-top:16px;font-size:1.4rem;color:#166534;min-height:2rem;font-weight:bold}
</style>
</head>
<body>
<a class="home" href="index.html">🏠</a>
<h1>🔢 Count With Me!</h1>
<div id="score">⭐ Stars: 0</div>
<div id="items"></div>
<div class="opts" id="opts"></div>
<div id="msg">How many do you see? Tap each one to count!</div>
<script src="common.js"></script>
<script>
const things=["🍎","🐤","🌟","🎈","🐟","🦋","🌸","🍓","🐢","🚗"];
let answer=0,stars=0,tapped=0;
function newRound(){tapped=0;answer=1+Math.floor(Math.random()*5);const t=things[Math.floor(Math.random()*things.length)];
const items=document.getElementById('items');items.innerHTML='';
for(let i=0;i<answer;i++){const s=document.createElement('span');s.textContent=t;s.style.animationDelay=(i*.15)+'s';
s.onclick=()=>{if(!s.classList.contains('counted')){s.classList.add('counted');tapped++;playSfx('click');say(String(tapped))}};items.appendChild(s)}
const opts=document.getElementById('opts');opts.innerHTML='';
const set=new Set([answer]);while(set.size<3)set.add(1+Math.floor(Math.random()*6));
[...set].sort(()=>Math.random()-.5).forEach(n=>{const b=document.createElement('button');b.textContent=n;
b.onclick=()=>{if(n===answer){b.classList.add('right');stars++;document.getElementById('score').textContent='⭐ Stars: '+stars;playSfx('correct');burstConfetti();
document.getElementById('msg').textContent='🎉 Yes! '+answer+'! Great counting!';say('Yes! '+answer+'! Great counting, '+cheerName()+'!');
setTimeout(newRound,1800)}else{playSfx('wrong');b.classList.add('wrong');document.getElementById('msg').textContent='Try counting again!';say('Oops, try counting again!')}};
opts.appendChild(b)});
document.getElementById('msg').textContent='How many do you see? Tap each one to count!'}
newRound();
</script>
</body>
</html>
